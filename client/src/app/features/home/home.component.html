@if (timeSpanLeaderBoard(); as leaderboard) {
  <div class="flex gap-6 p-6 h-[calc(100vh-4rem)] overflow-hidden">

    <!-- LEFT: leaderboard table -->
    <div class="w-1/3 flex flex-col min-h-0">
      <h1 class="text-xl font-semibold text-white mb-4 shrink-0">24 Hour Leaderboard</h1>

      <div class="overflow-y-auto rounded-lg border border-white/10 min-h-0">
        <table class="w-full text-sm">
          <thead class="bg-gray-900 sticky top-0 z-10">
            <tr>
              <th class="px-4 py-2 text-left font-medium text-gray-400">Character</th>
              <th class="px-4 py-2 text-right font-medium text-gray-400">XP Gained</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-white/10">
            @for (item of leaderboard.timeSpanLeaderboardItems; track item.character.name) {
              <tr
                (click)="goToCharacter(item.character.name)"
                class="cursor-pointer hover:bg-white/5 transition-colors"
              >
                <td class="px-4 py-2">
                  <div class="flex items-center gap-2">
                    <img
                      [src]="item.character.avatarUrl ?? '/assets/skill_icon_attack.gif'"
                      class="h-6 w-6 rounded-full"
                    />
                    <span class="text-gray-200">{{ item.character.name }}</span>
                  </div>
                </td>
                <td class="px-4 py-2 text-right text-gray-200">
                  {{ item.timeSpanOverallXp.toLocaleString() }}
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>

    <!-- RIGHT: bar chart -->
    <div class="w-2/3 flex flex-col min-h-0">
      <h2 class="text-lg font-semibold text-white mb-4 shrink-0">XP Gained — Last 24 Hours</h2>
      <div class="flex-1 min-h-0 relative">
        <osrsfghs-chart
          [type]="'bar'"
          [data]="chartData()"
          [options]="chartOptions"
        />
      </div>
    </div>

  </div>
}
