<nav class="relative bg-gray-800/50 after:pointer-events-none after:absolute after:inset-x-0 after:bottom-0 after:h-px after:bg-white/10">
  <div class="mx-auto max-w-7xl px-2 sm:px-6 lg:px-8">
    <div class="relative flex h-16 items-center justify-between">
      <div class="absolute inset-y-0 left-0 flex items-center sm:hidden">
        <!-- Mobile menu button-->
        <button type="button" command="--toggle" commandfor="mobile-menu" class="relative inline-flex items-center justify-center rounded-md p-2 text-gray-400 hover:bg-white/5 hover:text-white focus:outline-2 focus:-outline-offset-1 focus:outline-indigo-500">
          <span class="absolute -inset-0.5"></span>
          <span class="sr-only">Open main menu</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" data-slot="icon" aria-hidden="true" class="size-6 in-aria-expanded:hidden">
            <path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" data-slot="icon" aria-hidden="true" class="size-6 not-in-aria-expanded:hidden">
            <path d="M6 18 18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
      </div>
      <div class="flex flex-1 items-center justify-center sm:items-stretch sm:justify-start">
        <div class="flex shrink-0 items-center">
          <img src="assets/icon200.png" alt="osrs stats icon" class="h-8 w-auto" />
        </div>
        <div class="hidden sm:ml-6 sm:block">
          <div class="flex space-x-4">
            <!-- Current: "bg-gray-950/50 text-white", Default: "text-gray-300 hover:bg-white/5 hover:text-white" -->
             <!--
            <a routerLink="" aria-current="page" class="rounded-md bg-gray-950/50 px-3 py-2 text-sm font-medium text-white">Home</a>
            <a routerLink="highScores" class="rounded-md px-3 py-2 text-sm font-medium text-gray-300 hover:bg-white/5 hover:text-white">HighScores</a>
          -->
            <div class="flex space-x-4">
              <a routerLink="" routerLinkActive="bg-gray-950/50 text-white" [routerLinkActiveOptions]="{exact: true}"
                class="rounded-md px-3 py-2 text-sm font-medium text-gray-300 hover:bg-white/5 hover:text-white">
                Home
              </a>
              <a routerLink="highScores" routerLinkActive="bg-gray-950/50 text-white"
                class="rounded-md px-3 py-2 text-sm font-medium text-gray-300 hover:bg-white/5 hover:text-white">
                HighScores
              </a>
            </div>
          </div>
        </div>
      </div>
      <div class="absolute inset-y-0 right-0 flex items-center pr-2 sm:static sm:inset-auto sm:ml-6 sm:pr-0">
        <div class="relative">
          <input type="text"
            class="w-full bg-white/5 placeholder:text-gray-500 text-gray-200 text-sm border border-white/10 rounded-md pl-3 pr-20 py-2 transition duration-300 ease focus:outline-none focus:border-indigo-500 hover:border-white/20"
            placeholder="Zezima"
            #searchInput
            (keydown.enter)="onSearch(searchInput.value)"
          />
          <button
            class="absolute right-1 top-1 rounded bg-white/10 py-1 px-2.5 border border-transparent text-center text-sm text-white transition-all hover:bg-white/20 focus:bg-white/20 active:bg-white/20 disabled:pointer-events-none disabled:opacity-50"
            type="button"
            (click)="onSearch(searchInput.value)"
          >
            Search
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>
